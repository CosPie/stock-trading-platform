services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-16666}:16666"
    environment:
      APP_ADDR: ":16666"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:16666/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app-data:
